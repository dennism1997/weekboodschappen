services:
  app:
    build: .
    restart: unless-stopped
    expose:
      - "3001"
    volumes:
      - app-data:/data
    environment:
      - DATABASE_PATH=/data/weekboodschappen.db
      - JWT_SECRET=${JWT_SECRET:-dev-secret}
      - PORT=3001
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  caddy:
    image: caddy:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      app:
        condition: service_healthy

volumes:
  app-data:
  caddy-data:
  caddy-config:
