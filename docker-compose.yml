services:
  app:
    build: .
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      - app-data:/data
    environment:
      - DATABASE_PATH=/data/weekboodschappen.db
      - JWT_SECRET=${JWT_SECRET}
      - PORT=3001
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  app-data:
