name: Test
description: Run typecheck and tests

runs:
  using: composite
  steps:
    - uses: pnpm/action-setup@v5
      with:
        version: 10

    - uses: actions/setup-node@v6
      with:
        node-version: 24
        cache: pnpm

    - run: pnpm install --frozen-lockfile
      shell: bash

    - name: Typecheck
      run: pnpm -r run typecheck
      shell: bash

    - name: Test
      run: pnpm run test
      shell: bash
