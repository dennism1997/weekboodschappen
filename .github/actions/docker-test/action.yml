name: Docker Test
description: Build Docker image and run integration tests with testcontainers

runs:
  using: composite
  steps:
    - uses: pnpm/action-setup@v5
      with:
        version: 10

    - uses: actions/setup-node@v6
      with:
        node-version: 24
        cache: pnpm

    - run: pnpm install --frozen-lockfile
      shell: bash

    - name: Docker integration tests
      run: pnpm --filter @weekboodschappen/server run test:docker
      shell: bash
