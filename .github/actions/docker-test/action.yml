name: Docker Build & Test
description: Build Docker image and run container health and Playwright tests

runs:
  using: composite
  steps:
    - uses: docker/setup-buildx-action@v4

    - name: Build Docker image
      uses: docker/build-push-action@v7
      with:
        context: .
        load: true
        tags: weekboodschappen:test
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Start container
      shell: bash
      run: |
        docker run -d \
          --name test-container \
          -p 6883:6883 \
          -e BETTER_AUTH_SECRET=ci-test-secret \
          weekboodschappen:test

    - name: Wait for healthy
      shell: bash
      run: |
        for i in $(seq 1 10); do
          if curl -sf http://localhost:6883/api/health; then
            echo "Container is healthy"
            exit 0
          fi
          sleep 1
        done
        echo "Container failed to become healthy"
        docker logs test-container
        exit 1

    - name: Test Playwright Chromium
      shell: bash
      run: |
        docker exec -w /app/packages/server test-container node --input-type=module -e "
          import { chromium } from 'playwright';
          const browser = await chromium.launch({ channel: 'chromium' });
          const page = await browser.newPage();
          await page.goto('http://localhost:6883/api/health');
          const text = await page.textContent('body');
          console.log('Playwright response:', text);
          await browser.close();
          console.log('Playwright Chromium is working');
        "

    - name: Container logs
      if: always()
      shell: bash
      run: docker logs test-container
